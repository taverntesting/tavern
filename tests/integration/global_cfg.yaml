---
name: test global includes
description: used for testing against local server

variables:
  global_host: http://localhost:5003
  global_test_string_1: abc
  global_test_string_2: "{tavern.env_vars.SECOND_URL_PART}"

  retry_max: 4
  negative_int: -2

  # Variable to verify global tinctures are applied
  global_tincture_called: false

stages:
  - id: finally-nothing-check
    name: finally nothing check
    request:
      url: "{global_host}/echo"
      method: POST
      json:
        value: "123"

# Global tinctures applied to all test stages (issue #969)
tinctures:
  - function: ext_functions:global_tincture_marker
