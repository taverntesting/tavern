[tox]
envlist = py3,py3check

[testenv]
passenv = XDG_CACHE_HOME
extras =
    grpc
    mqtt
    graphql
    scriptable
dependency_groups =
    dev
commands =
    {envbindir}/python -m pytest --cov-report term-missing --cov tavern {posargs}

[testenv:py3check]
allowlist_externals =
    uv
commands =
    uv tool run prek run --all-files
