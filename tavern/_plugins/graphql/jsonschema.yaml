$schema: "http://json-schema.org/draft-07/schema#"

title: GraphQL schema
description: Schema for GraphQL API testing

###

type: object
additionalProperties: false
required:
  - graphql

properties:
  graphql:
    type: object
    description: Connection options for GraphQL
    additionalProperties: false
    required:
      - client

    properties:
      client:
        description: Arguments to pass to the GraphQL client constructor

        type: object
        additionalProperties: false

        properties:
          timeout:
            type: number
            description: Request timeout in seconds
            default: 30

          headers:
            type: object
            description: Default headers to include in all requests
            additionalProperties:
              type: string

          ws_url:
            type: string
            description: WebSocket URL for subscriptions (optional, auto-derived from url)
