---

test_name: Test pydantic validation fails on malformed response

includes:
  - !include common.yaml
  - !include components/auth_stage.yaml

_xfail: run

stages:
  - type: ref
    id: login_get_token
  - name: Malformed response should fail pydantic validation
    request:
      url: "{service}/malformed"
      method: GET
      headers:
        Content-Type: application/json
        Authorization: "Bearer {test_login_token}"
    response:
      status_code: 200
      headers:
        content-type: application/json
      verify_response_with:
        function: tavern.helpers:validate_pydantic
        extra_kwargs:
          model_location: "tavern_http_example.models:StrictPingResponse"