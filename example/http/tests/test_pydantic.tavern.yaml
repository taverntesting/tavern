---

test_name: Test pydantic validation on /numbers endpoint

includes:
  - !include common.yaml
  - !include components/auth_stage.yaml

stages:
  - name: reset database for test
    request:
      url: "{service}/reset"
      method: POST
    response:
      status_code: 204

  - type: ref
    id: login_get_token
  - name: post a number
    request:
      url: "{service}/numbers"
      json:
        name: testnumber
        number: 42
      method: POST
      headers:
        content-type: application/json
        Authorization: "bearer {test_login_token:s}"
    response:
      status_code: 201
      headers:
        content-type: application/json

  - name: get number with pydantic validation
    request:
      url: "{service}/numbers"
      params:
        name: testnumber
      method: GET
      headers:
        content-type: application/json
        Authorization: "bearer {test_login_token:s}"
    response:
      status_code: 200
      headers:
        content-type: application/json
      verify_response_with:
        function: tavern.helpers:validate_pydantic
        extra_kwargs:
          model_location: "tavern_http_example.models:NumberResponse"

