---

test_name: Test pydantic validation on /ping endpoint

includes:
  - !include common.yaml
  - !include components/auth_stage.yaml

stages:
  - name: Unauthenticated /ping
    request:
      url: "{service}/ping"
      method: GET
    response:
      status_code: 401

  - type: ref
    id: login_get_token
  - name: Authenticated /ping with pydantic validation
    request:
      url: "{service}/ping"
      method: GET
      headers:
        Content-Type: application/json
        Authorization: "Bearer {test_login_token}"
    response:
      status_code: 200
      headers:
        content-type: application/json
      verify_response_with:
        function: tavern.helpers:validate_pydantic
        extra_kwargs:
          model_location: "tavern_http_example.models:PingResponse"

