---
test_name: GraphQL mutations - Create new user

includes:
  - !include graphql_config.yaml

stages:
  - name: Create new user
    graphql_request:
      url: "{graphql_server_url}/graphql"
      query: |
        mutation CreateUser($name: String!, $email: String!) {
          createUser(name: $name, email: $email) {
            id
            name
            email
          }
        }
      variables:
        name: "Alice Johnson"
        email: "alice@example.com"
    graphql_response:
      data:
        createUser:
          id: "3"
          name: "Alice Johnson"
          email: "alice@example.com"

  - name: Verify created user exists
    graphql_request:
      url: "{graphql_server_url}/graphql"
      query: |
        query GetUser($id: ID!) {
          user(id: $id) {
            id
            name
            email
          }
        }
      variables:
        id: "3"
    graphql_response:
      data:
        user:
          id: "3"
          name: "Alice Johnson"
          email: "alice@example.com"

---
test_name: GraphQL mutations - Create new post

includes:
  - !include graphql_config.yaml

stages:
  - name: Create new post
    graphql_request:
      url: "{graphql_server_url}/graphql"
      query: |
        mutation CreatePost($title: String!, $content: String!, $authorId: ID!) {
          createPost(title: $title, content: $content, authorId: $authorId) {
            id
            title
            content
            authorId
          }
        }
      variables:
        title: "My First Post"
        content: "This is my first GraphQL post!"
        authorId: "3"
    graphql_response:
      data:
        createPost:
          id: "3"
          title: "My First Post"
          content: "This is my first GraphQL post!"
          authorId: "3"
