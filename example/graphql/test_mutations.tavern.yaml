---
test_name: GraphQL mutations - Create new user

includes:
  - !include graphql_config.yaml

stages:
  - name: Create new user
    graphql_request:
      url: "{graphql_server_url}/graphql"
      query: |
        mutation CreateUser($name: String!, $email: String!) {
          createUser(name: $name, email: $email) {
            id
            name
            email
          }
        }
      variables:
        name: "Alice Johnson"
        email: "alice@example.com"
    graphql_response:
      data:
        createUser:
          id: !anyint
          name: "Alice Johnson"
          email: "alice@example.com"
      save:
        data:
          user_id: data.createUser.id

  - name: Verify created user exists
    graphql_request:
      url: "{graphql_server_url}/graphql"
      query: |
        query GetUser($id: ID!) {
          user(id: $id) {
            id
            name
            email
          }
        }
      variables:
        id: "{user_id}"
    graphql_response:
      data:
        user:
          id: !int "{user_id}"
          name: "Alice Johnson"
          email: "alice@example.com"

---
test_name: GraphQL mutations - Create new post

includes:
  - !include graphql_config.yaml

stages:
  - name: Create new post
    graphql_request:
      url: "{graphql_server_url}/graphql"
      query: |
        mutation CreatePost($title: String!, $content: String!, $authorId: String!) {
          createPost(title: $title, content: $content, authorId: $authorId) {
            id
            title
            content
            authorId
          }
        }
      variables:
        title: "My First Post"
        content: "This is my first GraphQL post!"
        authorId: "3"
    graphql_response:
      data:
        createPost:
          id: !anyint
          title: "My First Post"
          content: "This is my first GraphQL post!"
          authorId: 3
