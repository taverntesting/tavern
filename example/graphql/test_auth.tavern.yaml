---
test_name: GraphQL authentication - Query with authorization header

includes:
  - !include graphql_config.yaml

stages:
  - name: Query with authorization header
    graphql_request:
      url: "{graphql_server_url}/graphql"
      query: |
        query GetUser($id: ID!) {
          user(id: $id) {
            id
            name
            email
          }
        }
      variables:
        id: "1"
      headers:
        Authorization: "Bearer test-token"
        X-API-Key: "test-api-key"
    graphql_response:
      data:
        user:
          id: !anyint
          name: "John Doe"
          email: "john@example.com"

---
test_name: GraphQL authentication - Query with custom content type

includes:
  - !include graphql_config.yaml

stages:
  - name: Query with custom content type
    graphql_request:
      url: "{graphql_server_url}/graphql"
      query: |
        query GetUsers {
          users {
            id
            name
            email
          }
        }
      headers:
        Content-Type: "application/json"
        Accept: "application/json"
        X-Custom-Header: "custom-value"
    graphql_response:
      data:
        users:
          - id: "1"
            name: "John Doe"
            email: "john@example.com"
          - id: "2"
            name: "Jane Smith"
            email: "jane@example.com"

---
test_name: GraphQL authentication - GET request with query parameters

includes:
  - !include graphql_config.yaml

stages:
  - name: GET request with query parameters
    graphql_request:
      url: "{graphql_server_url}/graphql"
      method: GET
      query: |
        query GetUser($id: ID!) {
          user(id: $id) {
            id
            name
            email
          }
        }
      variables:
        id: "2"
    graphql_response:
      data:
        user:
          id: "2"
          name: "Jane Smith"
          email: "jane@example.com"
