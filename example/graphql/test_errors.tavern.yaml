---
test_name: GraphQL error handling test

stages:
  - name: Query non-existent user
    graphql_request:
      url: "{graphql_server_url}/graphql"
      query: |
        query GetUser($id: ID!) {
          user(id: $id) {
            id
            name
            email
          }
        }
      variables:
        id: "999"
    graphql_response:
      status_code: 200
      json:
        data:
          user: null
        errors:
          - message: "User not found"

---
test_name: GraphQL error handling test

stages:
  - name: Invalid query
    graphql_request:
      url: "{graphql_server_url}/graphql"
      query: |
        query InvalidQuery {
          invalidField {
            id
          }
        }
    graphql_response:
      status_code: 200
      json:
        errors:
          - message: "Unknown query"

---
test_name: GraphQL error handling test

stages:
  - name: Missing query parameter
    graphql_request:
      url: "{graphql_server_url}/graphql"
      query: ""
    graphql_response:
      status_code: 400
      json:
        errors:
          - message: "No query provided"

---
test_name: GraphQL error handling test

_xfail: verify

stages:
  - name: Invalid JSON payload
    graphql_request:
      url: "{graphql_server_url}/graphql"
      method: POST
      headers:
        Content-Type: "application/json"
      json:
        invalid: "payload"
    graphql_response:
      status_code: 400
      json:
        errors:
          - message: "No query provided"
